schema_version: 1
study: study1
profile: smoke
seed: 42

data:
  dataset: SimulaMet/Kvasir-VQA-x1
  dataset_revision: 61e41148c3214bc5140ad0ab4c28520a512e2a73
  image_dataset: SimulaMet-HOST/Kvasir-VQA
  image_dataset_revision: 26df9125b98cbad664e5b1801aac1f70a02689e2
  split_manifest: protocols/study1/grouped_split_manifest.json

model:
  base_model: google/paligemma-3b-pt-224
  base_model_revision: 35e4f46485b4d07967e7e9935bc3786aad50687c
  backend: transformers-paligemma
  condition: base
  adapter: null
  adapter_revision: null
  device: cuda
  precision: float16
  quantization: none
  attn_implementation: eager
  trust_remote_code: false
  processor_use_fast: false
  prompt_template: paligemma

generation:
  max_new_tokens: 64
  do_sample: false
  temperature: null
  num_beams: 1
  batch_size: 1
  return_token_logprobs: true

target_scoring:
  target_source: saved_prediction
  reduction: mean_logprob
  include_eos: false
  batch_size: 1
  verify_generation_score: true
  absolute_tolerance: 0.001

attribution:
  methods:
    - decoder_answer_to_image_attention
    - answer_conditioned_grad_cam
  target_source: saved_prediction
  require_prediction_reproduction: true
  normalization: minmax
  output_dtype: float32
  zero_range_policy: error
  attention:
    layer: -1
    head_aggregation: mean
    answer_token_aggregation: mean
    image_tokens_only: true
  grad_cam:
    vision_layer: -1
    gradient_pooling: spatial_mean
    activation_combination: weighted_sum
    relu: true

execution:
  stage: smoke
  evaluation_partition: development
  max_items: 20
  shard_count: 1
  require_clean_git: false
  require_locked_protocol: false
  resume: true

monitoring:
  wandb_mode: offline
  log_every_steps: 1

storage:
  local_run_root: runs
  gcs_uri: null
